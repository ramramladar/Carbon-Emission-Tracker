<!DOCTYPE html>
<html>
<head>
<title>Carbon Emission Tracker - Admin Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
color:#003366;
}

.summary{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
flex:1;
text-align:center;
font-size:20px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#003366;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}
</style>
</head>

<body>

<h1>🌍 Carbon Emission Tracker - Admin Dashboard</h1>

<div class="summary">

<div class="card">
Total Records
<br>
<span id="totalRecords">0</span>
</div>

<div class="card">
Total Carbon (kg CO₂)
<br>
<span id="totalCarbon">0</span>
</div>

</div>

<table>

<thead>
<tr>
<th>Company Name</th>
<th>Company Type</th>
<th>Email</th>
<th>Electricity (kWh)</th>
<th>Diesel (L)</th>
<th>Petrol (L)</th>
<th>Carbon Emission (kg CO₂)</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAsnuw7ElsaGbH7owOtHnv6uEDVk0kKY0g",
authDomain: "carbon-emission-tracker-39876.firebaseapp.com",
projectId: "carbon-emission-tracker-39876",
storageBucket: "carbon-emission-tracker-39876.firebasestorage.app",
messagingSenderId: "1004239040954",
appId: "1:1004239040954:web:573f4f0b617304f0d36d83",
measurementId: "G-N8RT9092TX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadData(){

const querySnapshot =
await getDocs(collection(db,"submission"));

let table =
document.getElementById("tableBody");

let totalRecords = 0;
let totalCarbon = 0;

querySnapshot.forEach((doc)=>{

const data = doc.data();

let electricity =
Number(data.electricity || 0);

let carbon =
electricity * 0.4;

totalCarbon += carbon;
totalRecords++;

table.innerHTML += `
<tr>
<td>${data.companyName || ""}</td>
<td>${data.companyType || ""}</td>
<td>${data.email || ""}</td>
<td>${data.electricity || 0}</td>
<td>${data.diesel || 0}</td>
<td>${data.petrol || 0}</td>
<td>${carbon.toFixed(2)}</td>
</tr>
`;

});

document.getElementById("totalRecords").innerText =
totalRecords;

document.getElementById("totalCarbon").innerText =
totalCarbon.toFixed(2);

}

loadData();

</script>

</body>
</html>
