<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
color:#003366;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#003366;
color:white;
}

.total{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🌍 Carbon Emission Tracker - Admin Dashboard</h1>

<div class="total">
Total Records: <span id="totalRecords">0</span>
</div>

<table>
<thead>
<tr>
<th>Company</th>
<th>Type</th>
<th>Email</th>
<th>Electricity</th>
<th>Diesel</th>
<th>Petrol</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAsnuw7ElsaGbH7owOtHnv6uEDVk0kKY0g",
authDomain: "carbon-emission-tracker-39876.firebaseapp.com",
projectId: "carbon-emission-tracker-39876",
storageBucket: "carbon-emission-tracker-39876.firebasestorage.app",
messagingSenderId: "1004239040954",
appId: "1:1004239040954:web:573f4f0b617304f0d36d83",
measurementId: "G-N8RT9092TX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadData(){

const querySnapshot =
await getDocs(collection(db,"submission"));

let table = document.getElementById("tableBody");

let count = 0;

querySnapshot.forEach((doc)=>{

let data = doc.data();

count++;

table.innerHTML += `
<tr>
<td>${data.companyName || ""}</td>
<td>${data.companyType || ""}</td>
<td>${data.email || ""}</td>
<td>${data.electricity || 0}</td>
<td>${data.diesel || 0}</td>
<td>${data.petrol || 0}</td>
</tr>
`;

});

document.getElementById("totalRecords").innerText = count;

}

loadData();

</script>

</body>
</html>
