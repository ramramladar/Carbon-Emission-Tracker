<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.main{
flex:1;
padding:20px;
}

.header{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

.stats{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
</div>

<div class="main">

<div class="header">
<h1>Carbon Emission Tracker Admin</h1>
<p>Submitted Records</p>
</div>

<div class="stats">
Total Records: <span id="totalRecords">0</span>
</div>

<table>

<thead>
<tr>
<th>Company</th>
<th>Type</th>
<th>Email</th>
<th>Electricity</th>
<th>Diesel</th>
<th>Petrol</th>
<th>Date</th>
</tr>
</thead>

<tbody id="dataTable">
</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAsnuw7ElsaGbH7owOtHnv6uEDVk0kKY0g",
authDomain: "carbon-emission-tracker-39876.firebaseapp.com",
projectId: "carbon-emission-tracker-39876",
storageBucket: "carbon-emission-tracker-39876.firebasestorage.app",
messagingSenderId: "1004239040954",
appId: "1:1004239040954:web:573f4f0b617304f0d36d83",
measurementId: "G-N8RT9092TX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("dataTable");

async function loadData(){

try{

const querySnapshot =
await getDocs(collection(db,"submission"));

let count = 0;

querySnapshot.forEach((doc)=>{

count++;

const item = doc.data();

table.innerHTML += `
<tr>
<td>${item.companyName || ""}</td>
<td>${item.companyType || ""}</td>
<td>${item.email || ""}</td>
<td>${item.electricity || ""}</td>
<td>${item.diesel || ""}</td>
<td>${item.petrol || ""}</td>
<td>${item.submittedAt || ""}</td>
</tr>
`;

});

document.getElementById("totalRecords").innerText = count;

}
catch(error){

console.error(error);
alert("Error Loading Data");

}

}

loadData();

</script>

</body>
</html>
