<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.main{
flex:1;
padding:20px;
}

.header{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2563eb;
color:white;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
</div>

<div class="main">

<div class="header">
<h1>Carbon Emission Tracker Admin</h1>
<p>Submitted Records</p>
</div>

<table>

<thead>
<tr>
<th>Company</th>
<th>Type</th>
<th>Email</th>
<th>Electricity</th>
<th>Diesel</th>
<th>Petrol</th>
</tr>
</thead>

<tbody id="dataTable">
</tbody>

</table>

</div>

<script>

let records = JSON.parse(localStorage.getItem("carbonData")) || [];

let table = document.getElementById("dataTable");

records.forEach(function(item){

table.innerHTML += `
<tr>
<td>${item.companyName}</td>
<td>${item.companyType}</td>
<td>${item.email}</td>
<td>${item.electricity}</td>
<td>${item.diesel}</td>
<td>${item.petrol}</td>
</tr>
`;

});

</script>

</body>
</html>
