<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
    font-family:Arial;
    background:#dff6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    background:#003366;
    color:white;
    padding:10px 30px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyAsnuw7ElsaGbH7owOtHnv6uEDVk0kKY0g",
  authDomain: "carbon-emission-tracker-39876.firebaseapp.com",
  projectId: "carbon-emission-tracker-39876",
  storageBucket: "carbon-emission-tracker-39876.firebasestorage.app",
  messagingSenderId: "1004239040954",
  appId: "1:1004239040954:web:573f4f0b617304f0d36d83",
  measurementId: "G-N8RT9092TX"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.login = function(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;


signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Login Successful");

window.location.href="index.html";

})

.catch((error)=>{

alert("Wrong Email or Password");

});


}

</script>


</body>
</html>
